name: Backend TireCode CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  setup:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "postgresql://postgres:postgres_dev_pass@localhost:5432/sum_api"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_dev_pass
      POSTGRES_DB: sum_api

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Start Services (Postgres & Redis)
        run: docker-compose up -d postgres redis

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Wait for Postgres
        run: |
          until docker exec sum-postgres pg_isready -U postgres; do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Database Migrations
        run: npx prisma migrate deploy

      - name: Cache Node Modules & Prisma
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: |
            node_modules
            node_modules/.prisma
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/schema.prisma') }}

  static-analysis:
    name: 🔍 Static Analysis
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        check: [lint, format-check, typecheck]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore Cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            node_modules/.prisma
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/schema.prisma') }}

      - name: Run ${{ matrix.check }}
        run: npm run ${{ matrix.check }}
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/db"

