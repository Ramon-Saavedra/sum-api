name: Backend TireCode CI


on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_dev_pass
          POSTGRES_DB: sum_api
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://postgres:postgres_dev_pass@localhost:5432/sum_api"

      - name: Run Database Migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: "postgresql://postgres:postgres_dev_pass@localhost:5432/sum_api"

      - name: Static Analysis & Tests
        run: |
          npm run lint
          npm run format-check
          npm run typecheck
          npm test
        env:
          DATABASE_URL: "postgresql://postgres:postgres_dev_pass@localhost:5432/sum_api"
