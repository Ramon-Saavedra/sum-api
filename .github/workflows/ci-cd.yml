name: Backend TireCode CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate


      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            node_modules/.prisma
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/prisma/schema.prisma') }}

  static-analysis:
    name: 🔍 ${{ matrix.check }}
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        check: [lint, format-check, typecheck]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Restore Cache
        uses: actions/cache@v4
        id: cache-restore
        with:
          path: |
            node_modules
            node_modules/.prisma
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/prisma/schema.prisma') }}

      - name: Install dependencies if cache missed
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: npm ci && npx prisma generate

      - name: Run ${{ matrix.check }}
        run: npm run ${{ matrix.check }}
