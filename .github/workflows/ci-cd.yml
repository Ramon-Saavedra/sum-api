name: Backend TireCode CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/db"


      - name: Cache Node Modules & Prisma
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: |
            node_modules
            node_modules/.prisma
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/schema.prisma') }}

  static-analysis:
    name: 🔍 Static Analysis
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        check: [lint, format-check, typecheck]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore Cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            node_modules/.prisma
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/schema.prisma') }}

      - name: Run ${{ matrix.check }}
        run: npm run ${{ matrix.check }}
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/db"
